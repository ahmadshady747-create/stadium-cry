[build]
  publish = "public"

[[redirects]]
  from = "/villain"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/hero"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/cry-meter"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/tribunal"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/card/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/data/data.json"
  [headers.values]
    Cache-Control = "public, max-age=600, must-revalidate"

[[headers]]
  for = "/images/og/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/og-images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"